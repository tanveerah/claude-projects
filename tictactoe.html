<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .score-x span { color: #e94560; }
    .score-o span { color: #a8dadc; }
    .score-draw span { color: #888; }

    #restart {
      margin-top: 1.6rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #c73652; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scores">
    <div class="score-box score-x">X <span id="sx">0</span></div>
    <div class="score-box score-draw">Draws <span id="sd">0</span></div>
    <div class="score-box score-o">O <span id="so">0</span></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board = Array(9).fill(null);
    let current = 'X';
    let over = false;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = WINS.find(line => line.every(j => board[j] === current));
      if (win) {
        win.forEach(j => cells[j].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }));

    document.getElementById('restart').addEventListener('click', reset);

    function reset() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      status.textContent = "X's turn";
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    function updateScores() {
      document.getElementById('sx').textContent = scores.X;
      document.getElementById('so').textContent = scores.O;
      document.getElementById('sd').textContent = scores.D;
    }
  </script>
</body>
</html>
